<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            line-height: 1.5;
        }

        /* ----- Header ----- */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        header p {
            font-size: 1.2rem;
            color: #555;
        }

        /* ----- Image gallery ----- */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        .gallery figure {
            margin: 0;
            max-width: 400px;      /* limit width, adjust as you like */
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .gallery figcaption {
            text-align: center;
            margin-top: 0.5rem;
            font-style: italic;
            color: #333;
        }
    </style>
</head>
<body>

<header>
    <!-- Write your headline and sub‑header here -->
    <h1>GeoLens Test Webpage</h1>
    <p>This Webpage contains two images to showcase the functionality of the
        GeoLens browser plugin. One picture has been taken with the GeoCam app
        and the other picture with the regular camera app on a iPhone.</p>
</header>

<div class="gallery">
    <!-- First picture -->
    <figure>
        <img src="./imagesWebsite/IMG_7548.PNG" alt="GeoCam photo">
        <figcaption>IMG 1: GeoCam photo of the GEO 1 building.</figcaption>
    </figure>

    <!-- First picture Clone Rotated-->
    <figure>
        <img src="./imagesWebsite/IMG_7548 Kopie.PNG" alt="GeoCam photo">
        <figcaption>IMG 1: GeoCam photo of the GEO 1 building.</figcaption>
    </figure>

    <!-- Second picture -->
    <figure>
        <img src="./imagesWebsite/IMG_7549.JPG" alt="Camera app photo">
        <figcaption>IMG 2: Photo of the GEO 1 building taken with iPhone camera app.</figcaption>
    </figure>
</div>

</body>
</html>
